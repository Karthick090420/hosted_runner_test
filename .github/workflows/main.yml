name: CICD PIPLINE

on:
  workflow_dispatch

env:
  ECR_REPO: test
  ECR_ACCOUNT: "838661220488"
  AWS_REGION: us-east-1

jobs:
   build:
       runs-on: ubuntu-22.04

       permissions:
        id-token: write
        contents: read
  
       steps:
       - name: Checkout
         uses: actions/checkout@v2
  
  
       - name: Configure AWS Credential
         uses: aws-actions/configure-aws-credentials@v4
         with:
            role-to-assume: ${{secrets.OIDC_ARN}}
            aws-region: ${{ env.AWS_REGION }}
  
       - name: Authenticate AWS ECR
         uses: aws-actions/amazon-ecr-login@v2

       - name: Build Docker image
         run: docker build -t $ECR_REPO .

       - name: Tag Docker image
         run: docker tag $ECR_REPO:latest $ECR_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest

       - name: Push Docker image
         run: docker push $ECR_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest
     
      
        
